# placement.yaml
# Purpose: Selects which managed cluster receives the demo-app workload.
# Initially targets cluster-a (west-europe). To migrate, patch the label
# selector (e.g. region: north-europe) - ACM re-evaluates and the
# ApplicationSet moves the workload automatically.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: demo-app-placement
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  numberOfClusters: 1
  clusterSets:
    - production-clusters
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            region: west-europe
