# namespace.yaml
# Purpose: Creates the ACM application namespace on the Hub cluster.
# This is where ACM resources (Channel, Subscription, Placement) live — separate
# from the actual workload namespace (demo-app) that gets created on managed clusters.
apiVersion: v1
kind: Namespace
metadata:
  name: demo-app-acm
  labels:
    app.kubernetes.io/part-of: demo-app
