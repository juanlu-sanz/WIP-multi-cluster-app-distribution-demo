# applicationset.yaml
# Purpose: Deploys the demo application to whichever clusters the Placement selects.
# Uses the clusterDecisionResource generator to read from ACM PlacementDecisions,
# then templates an ArgoCD Application per selected cluster.
# Requires $GIT_ORG to be exported before applying (see 00-setup.adoc).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: demo-app-placement
        requeueAfterSeconds: 180
  template:
    metadata:
      name: demo-app-{{name}}
      labels:
        app.kubernetes.io/part-of: demo-app
    spec:
      project: default
      source:
        repoURL: https://github.com/${GIT_ORG}/multi-cluster-app-distribution-demo.git
        targetRevision: main
        path: 00-current-state
      destination:
        server: "{{server}}"
        namespace: demo-app
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
