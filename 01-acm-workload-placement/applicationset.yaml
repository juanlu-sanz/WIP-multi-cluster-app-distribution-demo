# applicationset.yaml
# Purpose: Deploys the demo application to whichever clusters the Placement selects.
# Uses the clusterDecisionResource generator to read from ACM PlacementDecisions,
# then templates an ArgoCD Application per selected cluster.
# Requires $GIT_REPO_URL to be exported before applying (see 00-setup.adoc).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-app
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  generators:
    - clusterDecisionResource:
        configMapRef: acm-placement
        labelSelector:
          matchLabels:
            cluster.open-cluster-management.io/placement: demo-app-placement
        requeueAfterSeconds: 180
  template:
    metadata:
      name: demo-app-{{name}}
      labels:
        app.kubernetes.io/part-of: demo-app
    spec:
      project: default
      source:
        repoURL: ${GIT_REPO_URL}
        targetRevision: main
        path: kustomize/overlays/production
      destination:
        server: "{{server}}"
        namespace: demo-app
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true

# Key fields:
#
# | Field | Purpose |
# |---|---|
# | `configMapRef: acm-placement` | Points to the ConfigMap that tells ArgoCD how to read PlacementDecision resources. |
# | `labelSelector` | Selects PlacementDecision resources generated by the `demo-app-placement` Placement. |
# | `requeueAfterSeconds: 180` | How often the generator re-reads PlacementDecision to detect cluster changes. |
# | `{{name}}` | Cluster name from the ArgoCD cluster secret (e.g. `cluster-a`). |
# | `{{server}}` | Cluster API server URL from the ArgoCD cluster secret. |
# | `source` | Must use singular `source` (not `sources` array) for ACM Search API compatibility. |
#
# > **Important:** Use `source` (singular), not `sources` (plural array). The ACM
# > Search indexer only reads the singular `source` field. With `sources`, the
# > `path`, `repoURL`, and `targetRevision` fields will be empty in the search
# > index, causing the ACM console to show "missing" status.
