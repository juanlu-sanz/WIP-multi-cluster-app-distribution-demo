# channel.yaml
# Purpose: Defines the source of application manifests for ACM Subscriptions.
# This Channel points to a Git repository containing the Kubernetes manifests
# (Deployment, Service, Route) for the demo application.
# Requires $GIT_ORG to be exported before applying (see main README).
apiVersion: apps.open-cluster-management.io/v1
kind: Channel
metadata:
  name: demo-app-channel
  namespace: demo-app-acm
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  type: Git
  pathname: https://github.com/${GIT_ORG}/multi-cluster-app-distribution-demo.git
