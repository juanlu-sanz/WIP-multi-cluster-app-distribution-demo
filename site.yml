runtime:
  cache_dir: ./.cache/antora

site:
  title: Multi-Cluster Application Distribution
  url: https://redhat-scholars.github.io/multi-cluster-app-distribution-demo
  start_page: multi-cluster-app-distribution::index.adoc

content:
  sources:
    - url: ./
      branches: HEAD
      start_path: documentation

asciidoc:
  attributes:
    release-version: master
    page-pagination: true
  extensions:
    - ./lib/tab-block.js
    - ./lib/remote-include-processor.js

ui:
  bundle:
    url: https://github.com/redhat-developer-demos/rhd-tutorial-ui/releases/download/v0.1.10/ui-bundle.zip
    snapshot: true
  supplemental_files:
    - path: ./supplemental-ui
    - path: .nojekyll
    - path: ui.yml
      contents: "static_files: [ .nojekyll ]"

output:
  dir: ./gh-pages
