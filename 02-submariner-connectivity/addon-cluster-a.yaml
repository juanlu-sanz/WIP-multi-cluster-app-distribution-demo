# addon-cluster-a.yaml
# Purpose: Triggers ACM to install the Submariner operator and agents on Cluster A.
# ACM manages Submariner as a ManagedClusterAddOn - creating this resource
# starts the installation of the gateway, route agent, and metrics proxy.
apiVersion: addon.open-cluster-management.io/v1alpha1
kind: ManagedClusterAddOn
metadata:
  name: submariner
  namespace: cluster-a
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  installNamespace: submariner-operator
