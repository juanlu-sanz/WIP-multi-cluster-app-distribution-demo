# submariner-config-cluster-b.yaml
# Purpose: Configures Submariner for Cluster B (Azure).
# ACM reads this to prepare the cloud environment (open NSG rules for IPsec)
# and designate gateway node(s) on the managed cluster.
apiVersion: submarineraddon.open-cluster-management.io/v1alpha1
kind: SubmarinerConfig
metadata:
  name: submariner
  namespace: cluster-b
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  gatewayConfig:
    gateways: 1
  IPSecNATTPort: 4500
  NATTEnable: true
  cableDriver: libreswan
  loadBalancerEnable: true
  credentialsSecret:
    name: cluster-b-cloud-creds
