# istio-cni.yaml
# Purpose: Deploys the Istio CNI plugin required for ambient mode.
# The CNI node agent intercepts pod traffic at the kernel level and
# creates the ztunnel socket for per-node proxy communication.
apiVersion: sailoperator.io/v1
kind: IstioCNI
metadata:
  name: default
spec:
  version: v1.30.1
  namespace: istio-cni
  values:
    cni:
      ambient:
        enabled: true
