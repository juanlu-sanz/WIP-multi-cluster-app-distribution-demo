# istio.yaml
# Purpose: Deploys the Istio control plane in ambient mode on the cluster.
# Ambient mode uses a per-node ztunnel DaemonSet for Layer 4 traffic interception
# instead of sidecar proxies in every pod.
apiVersion: sailoperator.io/v1
kind: Istio
metadata:
  name: default
  namespace: istio-system
spec:
  namespace: istio-system
  version: v1.30.1
  profile: ambient
  values:
    pilot:
      env:
        ENABLE_AMBIENT: "true"
    ztunnel:
      env:
        L4_POLICY_ENABLED: "true"
