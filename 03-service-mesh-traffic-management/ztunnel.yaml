# ztunnel.yaml
# Purpose: Deploys the ztunnel DaemonSet for ambient mode Layer 4 traffic handling.
# Each node gets a ztunnel pod that transparently intercepts and encrypts
# traffic for all pods in mesh-enrolled namespaces.
apiVersion: sailoperator.io/v1
kind: ZTunnel
metadata:
  name: default
  namespace: istio-system
spec:
  version: v1.30.1
  namespace: istio-system
