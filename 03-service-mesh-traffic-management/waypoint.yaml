# waypoint.yaml
# Purpose: Deploys a waypoint proxy for the demo-app namespace.
# The waypoint enables Layer 7 (HTTP) traffic management capabilities:
# routing rules, retries, timeouts, and header-based matching.
# Without it, ambient mode only handles Layer 4 (TCP) traffic.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-app-waypoint
  namespace: demo-app
  labels:
    istio.io/waypoint-for: service
    app.kubernetes.io/part-of: demo-app
spec:
  gatewayClassName: istio-waypoint
  listeners:
    - name: mesh
      port: 15008
      protocol: HBONE
