# virtualservice-100-cluster-a.yaml
# Purpose: Routes 100% of traffic to cluster-a (initial state).
# This is the starting configuration before migration.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: demo-app-routing
  namespace: demo-app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  hosts:
    - demo-app.demo-app.global
  http:
    - route:
        - destination:
            host: demo-app.demo-app.global
            subset: cluster-a
          weight: 100
