# service-entry.yaml
# Purpose: Makes the demo-app service from the remote cluster visible to the local mesh.
# This is the cross-cluster discovery mechanism - the mesh learns that
# demo-app.demo-app.global can be reached at the remote cluster's ingress gateway.
# Requires $REMOTE_INGRESS_IP to be exported before applying (see main README).
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: demo-app-cross-cluster
  namespace: demo-app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  hosts:
    - demo-app.demo-app.global
  location: MESH_INTERNAL
  ports:
    - number: 8080
      name: http
      protocol: HTTP
  resolution: DNS
  endpoints:
    - address: demo-app.demo-app.svc.cluster.local
      labels:
        cluster: local
    - address: ${REMOTE_INGRESS_IP}
      labels:
        cluster: remote
      ports:
        http: 15443
