# virtualservice-canary-90-10.yaml
# Purpose: Canary traffic split — 90% to cluster-a, 10% to cluster-b.
# Use this for gradual migration: validate the new cluster with a small percentage
# of real traffic before committing to a full switch.
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: demo-app-routing
  namespace: demo-app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  hosts:
    - demo-app.demo-app.global
  http:
    - route:
        - destination:
            host: demo-app.demo-app.global
            subset: cluster-a
          weight: 90
        - destination:
            host: demo-app.demo-app.global
            subset: cluster-b
          weight: 10
