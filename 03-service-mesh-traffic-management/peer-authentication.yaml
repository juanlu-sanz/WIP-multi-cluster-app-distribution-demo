# peer-authentication.yaml
# Purpose: Enforces strict mutual TLS for the demo-app namespace.
# With STRICT mode, no unencrypted traffic is allowed — every service must
# present a valid mesh identity (SPIFFE certificate) to communicate.
# This implements the zero-trust model: no service talks to any other
# unless explicitly allowed through the mesh.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: demo-app-strict
  namespace: demo-app
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  mtls:
    mode: STRICT
