# deployment.yaml
# Purpose: Base Deployment for the demo-app fake-service workload.
# Security-hardened following OpenShift restricted-v2 SCC best practices.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
  name: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: nicholasjackson/fake-service:v0.26.2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 9090
          env:
            - name: NAME
              value: "demo-app"
            - name: MESSAGE
              value: "Hello from demo-app"
            - name: LISTEN_ADDR
              value: "0.0.0.0:9090"
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /ready
              port: 9090
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /health
              port: 9090
          securityContext:
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
          imagePullPolicy: Always
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
