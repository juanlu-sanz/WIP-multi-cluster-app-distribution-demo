# deployment.yaml
# Purpose: Base Deployment for the demo-app podinfo workload.
# Security-hardened following OpenShift restricted-v2 SCC best practices.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
  name: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: ghcr.io/stefanprodan/podinfo:latest
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          ports:
            - containerPort: 9898
          env:
            - name: PODINFO_UI_MESSAGE
              value: "demo-app"
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /readyz
              port: 9898
          livenessProbe:
            initialDelaySeconds: 10
            httpGet:
              path: /healthz
              port: 9898
          securityContext:
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
          imagePullPolicy: Always
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      automountServiceAccountToken: false
