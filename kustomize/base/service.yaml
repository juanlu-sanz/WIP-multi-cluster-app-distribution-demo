# service.yaml
# Purpose: Exposes the demo-app Deployment within the cluster on port 9898.
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
  name: demo-app
spec:
  ports:
    - protocol: TCP
      port: 9898
      targetPort: 9898
  selector:
    app: demo-app
