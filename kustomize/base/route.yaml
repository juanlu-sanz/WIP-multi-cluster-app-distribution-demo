# route.yaml
# Purpose: Exposes the demo-app Service externally via an OpenShift Route.
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
  name: demo-app
spec:
  port:
    targetPort: 9090
  to:
    kind: Service
    name: demo-app
