# deployment.yaml
# Purpose: Deploys fake-service, a stateless web app that displays service name,
# namespace, node, upstream calls, and request details in a web UI - useful for
# visualizing which cluster is serving traffic during multi-cluster demos.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: nicholasjackson/fake-service:v0.26.2
          ports:
            - containerPort: 9090
              protocol: TCP
          env:
            - name: NAME
              value: "demo-app"
            - name: MESSAGE
              value: "Hello from demo-app"
            - name: LISTEN_ADDR
              value: "0.0.0.0:9090"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
