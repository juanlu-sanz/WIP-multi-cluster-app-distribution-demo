# deployment.yaml
# Purpose: Deploys podinfo, a stateless web app that displays pod name,
# namespace, node, and other runtime details - useful for visualizing
# which cluster is serving traffic during multi-cluster demos.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: ghcr.io/stefanprodan/podinfo:latest
          ports:
            - containerPort: 9898
              protocol: TCP
          env:
            - name: PODINFO_UI_MESSAGE
              value: "demo-app (manual deployment)"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9898
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9898
            initialDelaySeconds: 10
            periodSeconds: 15
