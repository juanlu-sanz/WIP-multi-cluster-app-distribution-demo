# service.yaml
# Purpose: Exposes the demo-app Deployment within the cluster on port 9898.
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - port: 9898
      targetPort: 9898
      protocol: TCP
  type: ClusterIP
