# route.yaml
# Purpose: Exposes the demo-app Service externally via an OpenShift Route.
# In the current state, this route is cluster-specific — its hostname changes
# when the app moves to a different cluster, forcing DNS/LB updates.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
    app.kubernetes.io/part-of: demo-app
spec:
  to:
    kind: Service
    name: demo-app
    weight: 100
  port:
    targetPort: 9090
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
