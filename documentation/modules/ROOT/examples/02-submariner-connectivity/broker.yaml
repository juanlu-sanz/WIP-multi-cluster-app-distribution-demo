# broker.yaml
# Purpose: Deploys the Submariner Broker on the Hub cluster.
# The Broker is the rendezvous point where managed clusters exchange
# endpoint information needed to establish encrypted tunnels.
apiVersion: submariner.io/v1alpha1
kind: Broker
metadata:
  name: submariner-broker
  namespace: production-clusters-broker
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  globalnetEnabled: false
