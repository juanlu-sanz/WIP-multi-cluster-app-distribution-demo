# placement-cluster-a.yaml
# Purpose: Initial Placement rule — deploys the application to cluster-a (west-europe).
# To migrate the app to a different cluster, replace this file with placement-cluster-b.yaml.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: demo-app-placement
  namespace: demo-app-acm
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  numberOfClusters: 1
  clusterSets:
    - production-clusters
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            region: west-europe
