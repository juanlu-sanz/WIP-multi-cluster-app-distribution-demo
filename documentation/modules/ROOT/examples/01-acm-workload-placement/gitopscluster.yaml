# gitopscluster.yaml
# Purpose: Registers ACM managed clusters as ArgoCD cluster secrets on the Hub.
# This bridges ACM's cluster inventory with ArgoCD, enabling ApplicationSets
# to deploy workloads to any cluster selected by a Placement.
apiVersion: apps.open-cluster-management.io/v1beta1
kind: GitOpsCluster
metadata:
  name: gitops-clusters
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: demo-app
spec:
  argoServer:
    cluster: local-cluster
    argoNamespace: openshift-gitops
  placementRef:
    kind: Placement
    apiVersion: cluster.open-cluster-management.io/v1beta1
    name: all-production-clusters
    namespace: openshift-gitops
